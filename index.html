<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Prevents Google and other search engines from finding or indexing this website -->
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    
    <title>Our Little Nest</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for smooth interactive charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- FontAwesome for clean mobile icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* Custom smooth scrollbar for transactions */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased pb-12">

    <!-- Premium iOS-Style Header -->
    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-100 pt-4 pb-3 px-4 viewport-fit=cover">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">Our Little Nest</h1>
                <p class="text-xs text-slate-500 font-medium">Keira’s Fam Ledger</p>
            </div>
            <!-- Dynamic Budget Control Icon Toggle -->
            <button onclick="toggleBudgetModal()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 active:scale-95 transition">
                <i class="fa-solid fa-sliders text-sm"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4 space-y-5">

        <!-- Budget Quick Editor Modal (Inline Hidden by Default) -->
        <div id="budgetModal" class="hidden bg-white border border-slate-200 rounded-2xl p-4 shadow-sm space-y-3 transition-all">
            <div class="flex justify-between items-center">
                <label class="text-sm font-semibold text-slate-700">Adjust Monthly Budget (RM)</label>
                <button onclick="toggleBudgetModal()" class="text-slate-400 text-xs font-medium">Close</button>
            </div>
            <div class="flex gap-2">
                <input type="number" id="budgetInput" value="3360" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm font-semibold focus:outline-none focus:border-indigo-500">
                <button onclick="updateBudget()" class="bg-indigo-600 text-white text-xs font-semibold px-4 py-2 rounded-xl active:bg-indigo-700">Save</button>
            </div>
        </div>

        <!-- Sticky Date Filter Panel -->
        <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 grid grid-cols-2 gap-2">
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-1">Start Date</label>
                <input type="date" id="startDate" onchange="filterData()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-2 py-1.5 text-xs font-medium focus:outline-none">
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-1">End Date</label>
                <input type="date" id="endDate" onchange="filterData()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-2 py-1.5 text-xs font-medium focus:outline-none">
            </div>
        </div>

        <!-- KPI Financial Cards Stack -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
                <span class="text-xs font-medium text-slate-400">Total Spent</span>
                <span id="totalSpentCard" class="text-lg font-bold text-slate-900 mt-2">RM 0.00</span>
            </div>
            <div id="statusContainer" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between transition-colors duration-300">
                <span id="statusLabel" class="text-xs font-medium text-slate-400">Remaining Balance</span>
                <span id="statusValueCard" class="text-lg font-bold text-slate-900 mt-2">RM 0.00</span>
            </div>
        </div>

        <!-- Chart Section 1: Categories Breakdown (Doughnut) -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3">
            <div class="flex justify-between items-center">
                <h2 class="text-sm font-bold text-slate-800">Category Breakdown</h2>
                <span class="text-[11px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full font-medium">Percentage</span>
            </div>
            <div class="relative w-full aspect-square max-h-[240px] mx-auto flex items-center justify-center">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <!-- Chart Section 2: Month-over-Month Comparison -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3">
            <h2 class="text-sm font-bold text-slate-800">Monthly Expense Trends</h2>
            <div class="w-full max-h-[180px]">
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>

        <!-- Recent Activity Feed -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3">
            <h2 class="text-sm font-bold text-slate-800">Recent Transactions</h2>
            <div id="transactionList" class="space-y-2 max-h-[260px] overflow-y-auto custom-scroll pr-1">
                <!-- Dynamic Items Inserted Here -->
                <p class="text-xs text-center text-slate-400 py-4">Fetching logs...</p>
            </div>
        </div>

    </main>

    <script>
        // Configuration & State
        // Linked directly to your live published web CSV endpoint
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQNFbJjjGDrZb4lrKTxM_VSXCaJG-g20AV41NqdjWpZD-rpA0QNX9SbfvqI-y1gncXu1xTl-sg0KZdM/pub?output=csv';

        let rawTransactions = [];
        let currentBudget = 3360;
        let categoryChartInst = null;
        let monthlyChartInst = null;

        // On Load initialization optimized for iOS response
        window.addEventListener('DOMContentLoaded', () => {
            // Default current month ranges into filter fields
            const now = new Date();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];
            
            document.getElementById('startDate').value = firstDay;
            document.getElementById('endDate').value = lastDay;

            fetchData();
        });

        function toggleBudgetModal() {
            const modal = document.getElementById('budgetModal');
            modal.classList.toggle('hidden');
        }

        function updateBudget() {
            const inputVal = document.getElementById('budgetInput').value;
            if (inputVal && inputVal > 0) {
                currentBudget = parseFloat(inputVal);
                filterData();
                toggleBudgetModal();
            }
        }

        // CSV parsing built directly without third-party dependencies to keep load times short
        async function fetchData() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                
                // Parse CSV rows cleanly handling escaped characters
                const lines = data.split('\n').map(line => line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || []);
                rawTransactions = [];

                // Skip header (i=0) and loop through data rows
                for(let i = 1; i < lines.length; i++) {
                    const row = lines[i].map(val => val.replace(/^"|"$/g, '').trim());
                    if (row.length >= 4) {
                        // Expected schema: [0] Timestamp, [1] Amount (RM), [2] Description, [3] Category
                        const timestampStr = row[0];
                        const amount = parseFloat(row[1].replace(/RM/g, '').replace(/,/g, '')) || 0;
                        const description = row[2] || 'Unspecified';
                        const category = row[3] || 'Other';

                        // Convert Google Sheet date string format to JS Object
                        const parsedDate = new Date(timestampStr);

                        if(!isNaN(parsedDate)) {
                            rawTransactions.push({
                                date: parsedDate,
                                amount: amount,
                                description: description,
                                category: category
                            });
                        }
                    }
                }

                // Sort newest items first
                rawTransactions.sort((a, b) => b.date - a.date);
                filterData();

            } catch (error) {
                console.error("Data ingestion failure:", error);
                document.getElementById('transactionList').innerHTML = `<p class="text-xs text-red-500 text-center py-4">Unable to connect to Google Sheet data.</p>`;
            }
        }

        function filterData() {
            const startStr = document.getElementById('startDate').value;
            const endStr = document.getElementById('endDate').value;
            
            const start = startStr ? new Date(startStr + 'T00:00:00') : null;
            const end = endStr ? new Date(endStr + 'T23:59:59') : null;

            // Filter subset based on selected calendar window
            const filtered = rawTransactions.filter(t => {
                if (start && t.date < start) return false;
                if (end && t.date > end) return false;
                return true;
            });

            updateDashboard(filtered);
        }

        function updateDashboard(data) {
            let totalSpent = 0;
            const categorySums = {};

            // Accumulate metrics
            data.forEach(t => {
                totalSpent += t.amount;
                categorySums[t.category] = (categorySums[t.category] || 0) + t.amount;
            });

            // Card calculations
            document.getElementById('totalSpentCard').innerText = `RM ${totalSpent.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            
            const statusContainer = document.getElementById('statusContainer');
            const statusLabel = document.getElementById('statusLabel');
            const statusValueCard = document.getElementById('statusValueCard');

            if (totalSpent > currentBudget) {
                // Budget burst state alert matching premium warning styling
                statusContainer.className = "bg-red-50 p-4 rounded-2xl shadow-sm border border-red-200 flex flex-col justify-between transition-colors duration-300";
                statusLabel.innerText = "Budget Status";
                statusLabel.className = "text-xs font-bold text-red-500 uppercase tracking-wide";
                statusValueCard.innerText = "⚠️ Budget Burst!";
                statusValueCard.className = "text-lg font-black text-red-600 mt-2";
            } else {
                // Safe steady budget mode
                statusContainer.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between transition-colors duration-300";
                statusLabel.innerText = "Remaining Balance";
                statusLabel.className = "text-xs font-medium text-slate-400";
                const remainder = currentBudget - totalSpent;
                statusValueCard.innerText = `RM ${remainder.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                statusValueCard.className = "text-lg font-bold text-slate-900 mt-2";
            }

            // Render visuals & lists
            renderDoughnutChart(categorySums);
            renderMonthlyChart(rawTransactions); // Historical chart evaluates total pool
            renderTransactionFeed(data);
        }

        function renderDoughnutChart(categoryData) {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            
            const labels = Object.keys(categoryData);
            const dataValues = Object.values(categoryData);

            if (categoryChartInst) categoryChartInst.destroy();

            if(labels.length === 0) {
                ctx.clearRect(0, 0, 200, 200);
                return;
            }

            categoryChartInst = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: [
                            '#4f46e5', '#06b6d4', '#10b981', '#f59e0b', '#ec4899', 
                            '#8b5cf6', '#ef4444', '#64748b', '#a855f7', '#14b8a6',
                            '#f97316', '#0ea5e9', '#84cc16', '#6b7280'
                        ],
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { boxWidth: 10, font: { size: 10 } }
                        }
                    },
                    cutout: '70%'
                }
            });
        }

        function renderMonthlyChart(allData) {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            
            // Map data to month bins
            const monthlyTotals = {};
            allData.forEach(t => {
                const monthLabel = t.date.toLocaleString('default', { month: 'short', year: '2-digit' });
                monthlyTotals[monthLabel] = (monthlyTotals[monthLabel] || 0) + t.amount;
            });

            // Sort months in order
            const labels = Object.keys(monthlyTotals).reverse().slice(-6); // Cap last 6 recorded active months
            const dataValues = labels.map(lbl => monthlyTotals[lbl]);

            if (monthlyChartInst) monthlyChartInst.destroy();

            monthlyChartInst = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Expenses (RM)',
                        data: dataValues,
                        backgroundColor: 'rgba(79, 70, 229, 0.85)',
                        borderRadius: 6,
                        barThickness: 16
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { display: false }, ticks: { font: { size: 9 } } },
                        x: { grid: { display: false }, ticks: { font: { size: 9 } } }
                    }
                }
            });
        }

        function renderTransactionFeed(items) {
            const listEl = document.getElementById('transactionList');
            if(items.length === 0) {
                listEl.innerHTML = `<p class="text-xs text-center text-slate-400 py-6">No transactions logged for this range.</p>`;
                return;
            }

            listEl.innerHTML = items.map(item => `
                <div class="flex justify-between items-center bg-slate-50 border border-slate-100 p-3 rounded-xl">
                    <div class="flex flex-col max-w-[70%]">
                        <span class="text-xs font-bold text-slate-800 truncate">${item.description}</span>
                        <div class="flex gap-2 items-center mt-0.5">
                            <span class="text-[9px] bg-slate-200/70 text-slate-600 px-1.5 py-0.2 rounded font-medium">${item.category}</span>
                            <span class="text-[9px] text-slate-400">${item.date.toLocaleDateString('en-MY', {day:'numeric', month:'short'})}</span>
                        </div>
                    </div>
                    <span class="text-xs font-bold text-slate-900">RM ${item.amount.toFixed(2)}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
